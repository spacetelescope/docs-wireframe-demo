name: Deploy examples to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - 'src/docs_wireframe_demo/static/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          # Copy examples
          cp -r examples/* _site/
          # Copy controller assets so examples can reference them
          mkdir -p _site/assets
          cp src/docs_wireframe_demo/static/wireframe-demo-controller.js _site/assets/
          cp src/docs_wireframe_demo/static/wireframe-demo-controls.css _site/assets/

      - name: Fix asset paths in examples
        run: |
          # Rewrite relative paths to the source tree → /assets/ for deployed site
          find _site -name '*.html' -exec sed -i \
            -e 's|../../src/docs_wireframe_demo/static/wireframe-demo-controller.js|/assets/wireframe-demo-controller.js|g' \
            -e 's|../../src/docs_wireframe_demo/static/wireframe-demo-controls.css|/assets/wireframe-demo-controls.css|g' \
            {} +

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
